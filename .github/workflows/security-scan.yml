name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  # 1. Bandit - Python security (No pip dependency, using docker)
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bandit
        run: |
          docker run --rm -v "$(pwd):/src" \
            -w /src \
            python:3.12-slim \
            sh -c "pip install bandit && bandit -r . -ll -f json -o bandit-report.json || true"
      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # 2. Trivy - Container & FS Scanner
  trivy:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  # 3. Semgrep - Fixed deprecated action path
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: p/security-audit
        # If you don't want Semgrep to block your build on findings:
        continue-on-error: true 

  # 4. Actionlint - Workflows linting
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-review
          level: error

  # 5. OSV Scanner - Dependency vulnerabilities
  osv-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and Run OSV-Scanner CLI
        run: |
          # Download and install the official binary
          curl -sSfL https://raw.githubusercontent.com/google/osv-scanner/main/scripts/bootstrap.sh | sh -s -- -b /usr/local/bin
          # Run the scan recursively
          osv-scanner -r . || true
