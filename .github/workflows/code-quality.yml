name: Code Quality

on: [push, pull_request]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Ruff linter
        uses: astral-sh/ruff-action@v4.1.0
        with:
          args: "check"
      
      - name: Check formatting
        uses: astral-sh/ruff-action@v4.1.0
        with:
          args: "format --check"
