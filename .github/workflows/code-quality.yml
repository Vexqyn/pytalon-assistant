name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ----------------------------------------------------------------------
  # 1. RUFF – Linting & Formatting
  # ----------------------------------------------------------------------
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Ruff linter
        uses: astral-sh/ruff-action@v4.1.0
        with:
          args: "check --ignore F401,F541,E402,E741"

      - name: Check formatting
        uses: astral-sh/ruff-action@v4.1.0
        with:
          args: "format --check"

  # ----------------------------------------------------------------------
  # 2. SECRETS DETECTION – Gitleaks
  # ----------------------------------------------------------------------
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ----------------------------------------------------------------------
  # 3. DEPENDENCY VULNERABILITY SCAN – Trivy
  # ----------------------------------------------------------------------
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ----------------------------------------------------------------------
  # 4. WORKFLOW LINTER – actionlint
  # ----------------------------------------------------------------------
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-review
          level: error

  # ----------------------------------------------------------------------
  # 5. STATIC SECURITY ANALYSIS – CodeQL
  # ----------------------------------------------------------------------
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ----------------------------------------------------------------------
  # 6. UPLOAD RUFF REPORT AS ARTIFACT (fixed – now ignores the same rules)
  # ----------------------------------------------------------------------
  ruff-artifact:
    runs-on: ubuntu-latest
    needs: ruff
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Run Ruff with SARIF output
        uses: astral-sh/ruff-action@v4.1.0
        with:
          args: "check --ignore F401,F541,E402,E741 --output-format sarif --output-file ruff-results.sarif"
      - name: Upload Ruff SARIF results
        uses: actions/upload-artifact@v4
        with:
          name: ruff-sarif-report
          path: ruff-results.sarif
